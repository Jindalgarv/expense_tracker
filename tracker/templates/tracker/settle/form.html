{% extends 'tracker/base.html' %}
{% load splitwise_tags %}

{% block title %}Settle Up{% endblock %}

{% block content %}
<div class="page-header animate-slide-up">
    <div>
        <h1>🤝 Settle Up</h1>
        <div class="page-subtitle">Record a payment made directly to a friend to clear your balances.</div>
    </div>
    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-outline">⬅️ Cancel</a>
    </div>
</div>

<div class="animate-slide-up" style="max-width: 600px; margin: 0 auto;">
    <div class="card card-glass">
        <div class="card-body">
            <form method="POST" style="display: flex; flex-direction: column; gap: var(--space-md);">
                {% csrf_token %}

                <!-- Recipient selector -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: var(--space-xs);">
                    <label for="to_user" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Friend to Pay</label>
                    <select name="to_user" id="to_user" class="form-select" required style="width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem; border-radius: var(--radius-md);">
                        <option value="">-- Select Friend --</option>
                        {% for friend_opt in friend_options %}
                        <option value="{{ friend_opt.user.id }}" {% if preselected_to == friend_opt.user.id %}selected{% endif %}>
                            {{ friend_opt.user.get_full_name|default:friend_opt.user.username }} 
                            ({% if friend_opt.balance > 0 %}owes you {{ friend_opt.balance|currency }}{% elif friend_opt.balance < 0 %}you owe {{ friend_opt.balance|abs_value|currency }}{% else %}settled up{% endif %})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Group selector (Optional) -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: var(--space-xs);">
                    <label for="group" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Group Scope (Optional)</label>
                    <select name="group" id="group" class="form-select" style="width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.6rem; border-radius: var(--radius-md);">
                        <option value="">General Balance (Non-group)</option>
                        {% for gp in groups %}
                        <option value="{{ gp.id }}" {% if group.id == gp.id %}selected{% endif %}>
                            {{ gp.get_type_display_icon }} {{ gp.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Amount -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: var(--space-xs);">
                    <label for="amount" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Amount Settled (₹)</label>
                    <input type="number" step="0.01" min="0.01" name="amount" id="amount" placeholder="0.00" class="form-input" required style="width: 100%;">
                </div>

                <!-- Date -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: var(--space-xs);">
                    <label for="date" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Payment Date</label>
                    <input type="date" name="date" id="date" value="{{ today|date:'Y-m-d' }}" class="form-input" required style="width: 100%;">
                </div>

                <!-- Notes -->
                <div class="form-group" style="display: flex; flex-direction: column; gap: var(--space-xs);">
                    <label for="notes" style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);">Notes</label>
                    <textarea name="notes" id="notes" placeholder="e.g. Paid via Paytm / Cash..." class="form-input" rows="3" style="width: 100%;"></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: var(--space-sm); margin-top: var(--space-sm);">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">
                        🤝 Record Payment
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
